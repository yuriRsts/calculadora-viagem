<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcular Rota</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b7cff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:#0f1115;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;

  background:
    radial-gradient(circle at top,
      rgba(0,255,255,.06),
      transparent 45%),
    #0d1117;

  padding:20px;
  border-radius:28px;

  border:1px solid rgba(0,255,255,.12);

  box-shadow:
    0 0 40px rgba(0,255,255,.05),
    0 20px 60px rgba(0,0,0,.7);

  backdrop-filter:blur(10px);
}

h2{
  text-align:center;
  margin-bottom:18px;
}

input,
select{

  width:100%;
  height:52px;

  background:
    linear-gradient(
      180deg,
      #0f1722,
      #09111b
    );

  color:white;

  border-radius:18px;

  border:1px solid rgba(0,255,255,.10);

  padding:0 16px;

  font-size:15px;

  box-shadow:
    inset 0 0 12px rgba(0,255,255,.03);

}

input:focus,
select:focus{

  border-color:#00f7ff;

  box-shadow:
    0 0 10px rgba(0,255,255,.2);

}

button{

  width:80%;
  max-width:260px;
  height:52px;

  margin:8px auto;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  cursor:pointer;

  color:#ffffff;
  font-size:15px;
  font-weight:600;

  border-radius:18px;

  background:
    linear-gradient(
      180deg,
      #0f1823,
      #081018
    );

  border:1px solid rgba(0,255,255,.45);

  box-shadow:
    inset 0 0 10px rgba(0,255,255,.08),
    0 0 10px rgba(0,255,255,.15),
    0 0 25px rgba(0,255,255,.08);

  transition:.25s;
}

button:hover{

  border-color:#00f7ff;

  box-shadow:
    0 0 15px rgba(0,255,255,.4),
    0 0 35px rgba(0,255,255,.2);

  transform:none;
}

button:active{
  transform:scale(0.98);
}
  
.secondary{
  background:#232a36;
  color:#fff;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px;
  font-size:13px;
  cursor:pointer;
  width:60%;
  max-width:260px;
  margin:8px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
}

.secondary:hover{
  background:#2b3444;
}
  
.info{
  font-size:13px;
  color:#bbb;
  margin-bottom:8px;
}

.resultado{

  background:
    linear-gradient(
      180deg,
      #101822,
      #09111a
    );

  border-radius:22px;

  border:1px solid rgba(0,255,255,.12);

  box-shadow:
    0 0 25px rgba(0,255,255,.05);

  padding:18px;
}

.mapa{
  width:100%;
  height:260px;
  margin-top:12px;

  border-radius:22px;
  border:1px solid rgba(0,255,255,.25);

  overflow:hidden;

  box-shadow:
    0 0 20px rgba(0,255,255,.08);
}

#offline-msg{
  display:none;
  background:#ff0000;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
  margin-bottom:12px;
  border-radius:8px;
}

.botoes-app button{
  margin-top:8px;
}
.parada-item{

  position:relative;

  margin-bottom:10px;

  display:flex;
  align-items:center;

  background:
    linear-gradient(
      180deg,
      #101925,
      #09111a
    );

  border-radius:18px;

  border:1px solid rgba(0,255,255,.08);

  overflow:hidden;
}

.remover-parada{

  position:absolute;

  right:12px;
  top:15%;

  transform:translateY(-50%);

  width:28px;
  height:28px;

  border:none;
  border-radius:50%;

  background:#141c26;

  color:#ffffff;

  font-size:16px;

  display:flex;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  box-shadow:
    inset 0 0 4px rgba(255,255,255,.05);

  transition:none;
}

.remover-parada:hover{
  background:#1a2430;
}
.remover-parada:active{
  transform:translateY(-50%);
}
  .remover-parada,
.remover-parada:hover,
.remover-parada:active{
  transition:none !important;
  transform:none !important;
  box-shadow:none !important;
}
.parada-item input{
  width:100%;
  padding-right:42px;
}

.drag-handle{

  width:50px;
  height:50px;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#00eaff;

  font-size:24px;

  background:transparent;

  cursor:grab;
}

button{
  width:70%;
  max-width:240px;
  margin:8px auto;
}

  .bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  background:#161a22;
  border-top:1px solid rgba(255,255,255,0.08);

  padding:10px;

  display:flex;
  justify-content:center;

  z-index:9998;
}

.bottom-bar button{
  width:80%;
  max-width:260px;
  margin:0;
}

/* BOTÃO PREMIUM INSTALAR */
.btn-install{
  display:none;
  width:100%;
  height:52px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  margin-bottom:15px;
  background:linear-gradient(135deg,#00c853,#00e676);
  box-shadow:0 0 15px rgba(0,255,120,.35);
  animation:pulse 1.8s infinite;
  transition:.25s;
}

.btn-install:hover{
  transform:scale(1.02);
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(0,255,120,.55);}
  70%{box-shadow:0 0 0 18px rgba(0,255,120,0);}
  100%{box-shadow:0 0 0 0 rgba(0,255,120,0);}
}

  .acoes-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.btn-calcular{
  width:220px;
  margin:0;
}

.fab-menu{

  width:52px;
  height:52px;

  border-radius:50%;

  background:
    linear-gradient(
      180deg,
      #0f1823,
      #09111a
    );

  border:1px solid rgba(0,255,255,.45);

  box-shadow:
    0 0 12px rgba(0,255,255,.2);

  color:#00f7ff;
}

.menu-acoes{
  display:none;

  margin-top:12px;

  background:#161a22;

  border-radius:14px;

  padding:10px;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.menu-acoes button{
  width:100%;
  max-width:none;
  margin:6px 0;
}
  .menu-rotas{
  display:none;
  margin-top:8px;
  border-radius:16px;
  overflow:hidden;
  background:#08111a;
  border:1px solid rgba(0,234,255,.25);
}

.item-rota{
  padding:14px;
  cursor:pointer;
  color:#fff;
  border-bottom:1px solid rgba(0,234,255,.08);
  transition:.15s;
}

.item-rota:hover{
  background:rgba(0,234,255,.08);
}

.item-rota:last-child{
  border-bottom:none;
}
</style>
</head>

<body>

<div class="container">

<div id="offline-msg">
⚠️ Necessita conexão com internet para calcular rotas.
</div>

<button id="btnInstalar" class="btn-install">
📲 Instalar App
</button>

<h2>Calcular Rota</h2>

<input id="origem" placeholder="Endereço de origem">
  
<div id="paradasContainer"></div>

<button type="button" onclick="adicionarParada()">
  📍 Adicionar local
</button>  
  
</select>
<input id="kmLitro" type="number" step="0.1" placeholder="Km por litro">
<input id="precoGasolina" type="number" step="0.01" placeholder="Preço da gasolina">

<div class="info">
🛣️ Pedágio estimado automaticamente pela distância.<br>
(Opcional) Informe abaixo para substituir o valor.
</div>

<input id="pedagioManual" type="number" step="0.01" placeholder="Pedágio manual (opcional)">

<div class="acoes-container">

  <button class="btn-calcular" onclick="calcular()">
    Calcular
  </button>

  <button
    class="btn-acoes"
    onclick="toggleMenuAcoes()">
    ⚙️
  </button>

</div>

<div id="menuAcoes" class="menu-acoes">

    <button onclick="togglePassageiros()">
    👥 Dividir custos
  </button>
  <div id="passageirosBox" style="display:none;">
  <input
    id="passageiros"
    type="number"
    min="1"
    value="1"
    placeholder="Quantidade de passageiros">

</div>
  
<button onclick="toggleRotas()">
📂 Rotas salvas
</button>

<div id="listaRotas" class="menu-rotas">
  <!-- rotas inseridas via JS -->
</div>
<input id="nomeRota" placeholder="Nome da rota (opcional)">
  
  <button onclick="salvarRota()">
    ⭐ Salvar rota atual
  </button>

  <button onclick="apagarRota()">
    🗑 Apagar rota selecionada
  </button>

</div>

<div id="resultado" class="resultado" style="display:none"></div>
<div id="mapa" class="mapa"></div>

</div>

<script>
let map,directionsService,directionsRenderer,autocompleteService;
let ultimaRota = "";
let contadorParadas = 0;
let deferredPrompt;

const VALOR_PEDAGIO_POR_KM = 0.08;

/* GOOGLE MAPS */
function initMap(){
  map = new google.maps.Map(document.getElementById("mapa"),{
    center:{lat:-23.55,lng:-46.63},
    zoom:5
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});

  autocompleteService = new google.maps.places.AutocompleteService();

  configurarAutocomplete("origem");
new Sortable(
  document.getElementById("paradasContainer"),
  {
    animation:150,
    handle:".drag-handle"
  }
);
}

/* AUTOCOMPLETE */
function configurarAutocomplete(id){
  const input = document.getElementById(id);
  const lista = document.createElement("div");

  lista.style.position="absolute";
  lista.style.background="#1b1b1b";
  lista.style.border="1px solid #444";
  lista.style.borderRadius="6px";
  lista.style.zIndex="9999";
  lista.style.display="none";

  document.body.appendChild(lista);

  input.addEventListener("input",()=>{
    const valor=input.value.trim();

    if (valor.length < 3) {
  lista.style.display = "none";
  return;
}

    const rect=input.getBoundingClientRect();

    lista.style.left = rect.left + "px";
    lista.style.top = rect.bottom + window.scrollY + "px";
    lista.style.width = rect.width + "px";

    autocompleteService.getPlacePredictions(
      {
        input:valor,
        componentRestrictions:{country:"br"}
      },
      predictions=>{
        lista.innerHTML="";

        if (!predictions || predictions.length === 0) {
  lista.style.display = "none";
  return;
}

        predictions.forEach(p=>{
          const item=document.createElement("div");

          item.textContent=p.description;
          item.style.padding="10px";
          item.style.cursor="pointer";

          item.onclick=()=>{
            input.value=p.description;
            lista.style.display="none";
          };

          lista.appendChild(item);
        });

        lista.style.display="block";
      }
    );
  });

  document.addEventListener("click",(e)=>{
    if(e.target !== input){
      lista.style.display="none";
    }
  });
}
function atualizarDestinoVisual(){

  const badges =
    document.querySelectorAll(".destino-badge");

  badges.forEach(badge=>{
    badge.style.display="none";
  });

  const itens =
    document.querySelectorAll(".parada-item");

  if(itens.length){

    const ultimo = itens[itens.length-1];

    const badge =
      ultimo.querySelector(".destino-badge");

    if(badge){
      badge.style.display="block";
    }

  }
}
/* CALCULAR */
function adicionarParada(){

  contadorParadas++;

  const wrapper=document.createElement("div");

  wrapper.className="parada-item";

  wrapper.innerHTML=`

    <div class="drag-handle" title="Arrastar">
      ☰
    </div>

    <input
      id="parada${contadorParadas}"
      class="parada"
      placeholder="Local ${contadorParadas}">

<button
  type="button"
  class="remover-parada"
  title="Remover parada">
  ✕
</button>

  `;

  wrapper
    .querySelector(".remover-parada")
    .addEventListener("click",()=>{

      wrapper.remove();

      if(typeof atualizarDestinoVisual==="function"){
        atualizarDestinoVisual();
      }

    });

document
  .getElementById("paradasContainer")
  .appendChild(wrapper);

  configurarAutocomplete(
    `parada${contadorParadas}`
  );

  if(typeof atualizarDestinoVisual==="function"){
    atualizarDestinoVisual();
  }
}
function calcular(){

  const origem=document.getElementById("origem").value;

  const kmLitro=parseFloat(
    document.getElementById("kmLitro").value
  );

  const preco=parseFloat(
    document.getElementById("precoGasolina").value
  );

  const pedagioManual=parseFloat(
    document.getElementById("pedagioManual").value
  );

  const passageiros=parseInt(
    document.getElementById("passageiros")?.value || 1
  );

  const locais=[];

document
  .querySelectorAll(".parada")
  .forEach(input=>{

    if(input.value.trim()){
      locais.push(input.value.trim());
    }

  });

if(!origem || locais.length===0){

  alert(
    "Informe origem e pelo menos um local."
  );

  return;
}
    

  if(
    isNaN(kmLitro) ||
    kmLitro<=0 ||
    isNaN(preco) ||
    preco<=0
  ){
    alert("Preencha corretamente os dados.");
    return;
  }

  const destino =
  locais[locais.length-1];

const waypoints =
  locais
    .slice(0,-1)
    .map(local=>({
      location:local,
      stopover:true
    }));

  directionsService.route(
    {
      origin:origem,
      destination:destino,
      waypoints:waypoints,
      optimizeWaypoints:false,
      travelMode:"DRIVING"
    },

    (res,status)=>{

      if(status!=="OK"){
        alert("Erro ao calcular rota.");
        return;
      }

      directionsRenderer.setDirections(res);

      let distanciaKm=0;
      let tempoSegundos=0;

      res.routes[0].legs.forEach(leg=>{

        distanciaKm+=leg.distance.value;
        tempoSegundos+=leg.duration.value;

      });

      distanciaKm=distanciaKm/1000;

      const horas=Math.floor(
        tempoSegundos/3600
      );

      const minutos=Math.floor(
        (tempoSegundos%3600)/60
      );

      const duracao=
        horas+"h "+minutos+"min";

      const combustivel=
        (distanciaKm/kmLitro)*preco;

      const pedagioEstimado=
        distanciaKm*VALOR_PEDAGIO_POR_KM;

      const pedagioFinal=
        !isNaN(pedagioManual) &&
        pedagioManual>0
        ? pedagioManual
        : pedagioEstimado;

      const total=
        combustivel+pedagioFinal;

      const custoPorPessoa=
        total/passageiros;

      ultimaRota=`
🚗 Calcular Rota

📏 Distância: ${distanciaKm.toFixed(2)} km
⏱️ Tempo: ${duracao}
⛽ Combustível: R$ ${combustivel.toFixed(2)}
🛣️ Pedágio: R$ ${pedagioFinal.toFixed(2)}
💰 Total: R$ ${total.toFixed(2)}
👥 Por pessoa: R$ ${custoPorPessoa.toFixed(2)}
      `;

      document.getElementById(
        "resultado"
      ).style.display="block";

      document.getElementById(
        "resultado"
      ).innerHTML=`

📏 Distância: ${distanciaKm.toFixed(2)} km<br>
⏱️ Tempo: ${duracao}<br>
⛽ Combustível: R$ ${combustivel.toFixed(2)}<br>
🛣️ Pedágio estimado: R$ ${pedagioFinal.toFixed(2)}<br>
💰 Total: R$ ${total.toFixed(2)}<br>
👥 Custo por pessoa: R$ ${custoPorPessoa.toFixed(2)}<br><br>

<div class="botoes-app">

<button onclick="abrirGoogleMaps('${origem}','${destino}')">
📍 Abrir no Google Maps
</button>

<button onclick="abrirWaze('${destino}')">
🚗 Abrir no Waze
</button>

<button onclick="compartilharResultado()">
📤 Compartilhar
</button>

</div>

      `;
    }
  );
}

/* LINKS */
function abrirGoogleMaps(origem,destino){
  const url=`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origem)}&destination=${encodeURIComponent(destino)}&travelmode=driving`;
  window.open(url,"_blank");
}

function abrirWaze(destino){
  const url=`https://www.waze.com/ul?q=${encodeURIComponent(destino)}&navigate=yes`;
  window.open(url,"_blank");
}

/* COMPARTILHAR */
function compartilharResultado(){

  if(!ultimaRota){
    alert("Calcule uma rota primeiro.");
    return;
  }

  if(navigator.share){

    navigator.share({
      title:"Calcular Rota",
      text:ultimaRota
    });

  }else{

    navigator.clipboard.writeText(
      ultimaRota
    );

    alert(
      "Resultado copiado para a área de transferência."
    );

  }
}

/* FAVORITOS */
function salvarRota(){

  const nome =
    document.getElementById("nomeRota").value ||
    "Rota sem nome";

  const origem =
    document.getElementById("origem").value;

  const paradas = [];

  document.querySelectorAll(".parada").forEach(input => {
    if (input.value.trim()) {
      paradas.push(input.value.trim());
    }
  });

  if (!origem || paradas.length === 0) {
    alert("Informe origem e pelo menos uma parada.");
    return;
  }

  const rota = {
    id: Date.now(), // 👈 IMPORTANTE para deletar depois
    nome,
    origem,
    paradas
  };

  const rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  rotas.push(rota);

  localStorage.setItem("rotas", JSON.stringify(rotas));

  carregarListaRotas();

  alert("Rota salva com sucesso!");
}

function carregarListaRotas(){

  const select = document.getElementById("rotasSalvas");

  select.innerHTML = '<option value="">Rotas salvas</option>';

  const rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  rotas.forEach((rota, index) => {

    const option = document.createElement("option");

    option.value = index;
    option.textContent = rota.nome;

    select.appendChild(option);

  });
}

let rotaSelecionada = null;
  
function carregarRota(){

  const index =
    document.getElementById("rotasSalvas").value;

  if (index === "") return;

  const rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  const rota = rotas[index];

  document.getElementById("nomeRota").value = rota.nome;
  document.getElementById("origem").value = rota.origem;

  document.getElementById("paradasContainer").innerHTML = "";
  contadorParadas = 0;

  rota.paradas.forEach(parada => {
    adicionarParada();
    document.getElementById(`parada${contadorParadas}`).value = parada;
  });
}
function togglePassageiros(){
  const box = document.getElementById("passageirosBox");

  if (box.style.display === "none") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}
carregarListaRotas();

/* INTERNET */
function verificarInternet(){
  const aviso=document.getElementById("offline-msg");

  if(navigator.onLine){
    aviso.style.display="none";
  }else{
    aviso.style.display="block";
  }
}

  function toggleMenuAcoes(){

  const menu =
    document.getElementById("menuAcoes");

  if(menu.style.display === "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";

  }

}
  function toggleRotas(){

  const lista =
    document.getElementById("listaRotas");

  if(lista.style.display === "block"){
    lista.style.display = "none";
  }else{
    carregarMenuRotas();
    lista.style.display = "block";
  }
}
  function carregarMenuRotas(){

  const lista =
    document.getElementById("listaRotas");

  lista.innerHTML = "";

  const rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  if(rotas.length === 0){

    lista.innerHTML =
      '<div class="item-rota">Nenhuma rota salva</div>';

    return;
  }

  rotas.forEach((rota,index)=>{

    const item =
      document.createElement("div");

    item.className = "item-rota";

    item.innerHTML =
      `📍 ${rota.nome}`;

    item.onclick = ()=>{

      carregarRotaCustom(index);

      lista.style.display = "none";
    };

    lista.appendChild(item);
  });
}
  function carregarRotaCustom(index){
rotaSelecionada = index;
  const rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  const rota = rotas[index];

  if(!rota) return;

  document.getElementById("nomeRota").value =
    rota.nome;

  document.getElementById("origem").value =
    rota.origem;

  document.getElementById("paradasContainer").innerHTML =
    "";

  contadorParadas = 0;

  rota.paradas.forEach(parada=>{

    adicionarParada();

    document.getElementById(
      `parada${contadorParadas}`
    ).value = parada;
  });
}
  function apagarRota(){

  if(rotaSelecionada === null){

    alert("Selecione uma rota.");

    return;
  }

  let rotas =
    JSON.parse(localStorage.getItem("rotas")) || [];

  rotas.splice(rotaSelecionada,1);

  localStorage.setItem(
    "rotas",
    JSON.stringify(rotas)
  );

  rotaSelecionada = null;

  carregarMenuRotas();

  alert("Rota apagada.");
}
window.addEventListener("online",verificarInternet);
window.addEventListener("offline",verificarInternet);

verificarInternet();

/* BOTÃO INSTALAR APP */
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("btnInstalar").style.display="block";
});

document.getElementById("btnInstalar").addEventListener("click",async()=>{
  if(!deferredPrompt) return;

  deferredPrompt.prompt();

  await deferredPrompt.userChoice;

  deferredPrompt=null;

  document.getElementById("btnInstalar").style.display="none";
});

// version: 3.4.0
</script>
