<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcular Rota</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b7cff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:#1e1e1e;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;
  background:#2a2a2a;
  padding:20px;
  border-radius:12px;
}

h2{
  text-align:center;
  margin-bottom:18px;
}

input,button{
  width:100%;
  height:46px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #444;
  background:#1f1f1f;
  color:#fff;
  padding:0 12px;
  font-size:15px;
}

button{
  background:linear-gradient(135deg,#4a90e2,#357ab8);
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.92;
}

.info{
  font-size:13px;
  color:#bbb;
  margin-bottom:8px;
}

.resultado{
  margin-top:12px;
  background:#1b1b1b;
  padding:12px;
  border-radius:8px;
  font-size:14px;
}

.mapa{
  width:100%;
  height:260px;
  margin-top:12px;
  border-radius:10px;
  overflow:hidden;
}

#offline-msg{
  display:none;
  background:#ff0000;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
  margin-bottom:12px;
  border-radius:8px;
}

.botoes-app button{
  margin-top:8px;
}
.parada-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}

.parada-item input{
  flex:1;
  margin-bottom:0;
}

.drag-handle{
  width:40px;
  height:46px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#333;
  border-radius:8px;
  cursor:grab;
  font-size:20px;
}
  .remover-parada{
  width:32px !important;
  min-width:32px;
  max-width:32px;

  height:32px;

  border:none;
  border-radius:6px;

  background:#c62828;
  color:white;

  cursor:pointer;

  font-size:14px;

  padding:0;

  margin:0;

  flex-shrink:0;
}
/* BOTÃO PREMIUM INSTALAR */
.btn-install{
  display:none;
  width:100%;
  height:52px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  margin-bottom:15px;
  background:linear-gradient(135deg,#00c853,#00e676);
  box-shadow:0 0 15px rgba(0,255,120,.35);
  animation:pulse 1.8s infinite;
  transition:.25s;
}

.btn-install:hover{
  transform:scale(1.02);
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(0,255,120,.55);}
  70%{box-shadow:0 0 0 18px rgba(0,255,120,0);}
  100%{box-shadow:0 0 0 0 rgba(0,255,120,0);}
}
</style>
</head>

<body>

<div class="container">

<div id="offline-msg">
⚠️ Necessita conexão com internet para calcular rotas.
</div>

<button id="btnInstalar" class="btn-install">
📲 Instalar App
</button>

<h2>Calcular Rota</h2>

<input id="nomeRota" placeholder="Nome da rota (opcional)">

<input id="origem" placeholder="Endereço de origem">

<div id="paradasContainer"></div>

<button type="button" onclick="adicionarParada()">
➕ Adicionar local
</button>

<input id="passageiros" type="number" min="1" placeholder="Quantidade de Passageiros">

<button type="button" onclick="salvarRota()">
⭐ Salvar rota
</button>

<select id="rotasSalvas" onchange="carregarRota()">
<option value="">Rotas salvas</option>
</select>
<input id="kmLitro" type="number" step="0.1" placeholder="Km por litro">
<input id="precoGasolina" type="number" step="0.01" placeholder="Preço da gasolina">

<div class="info">
🛣️ Pedágio estimado automaticamente pela distância.<br>
(Opcional) Informe abaixo para substituir o valor.
</div>

<input id="pedagioManual" type="number" step="0.01" placeholder="Pedágio manual (opcional)">

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="resultado" style="display:none"></div>
<div id="mapa" class="mapa"></div>

</div>

<script>
let map,directionsService,directionsRenderer,autocompleteService;
let ultimaRota = "";
let contadorParadas = 0;
let deferredPrompt;

const VALOR_PEDAGIO_POR_KM = 0.08;

/* GOOGLE MAPS */
function initMap(){
  map = new google.maps.Map(document.getElementById("mapa"),{
    center:{lat:-23.55,lng:-46.63},
    zoom:5
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});

  autocompleteService = new google.maps.places.AutocompleteService();

  configurarAutocomplete("origem");
new Sortable(
  document.getElementById("paradasContainer"),
  {
    animation:150,
    handle:".drag-handle"
  }
);
}

/* AUTOCOMPLETE */
function configurarAutocomplete(id){
  const input = document.getElementById(id);
  const lista = document.createElement("div");

  lista.style.position="absolute";
  lista.style.background="#1b1b1b";
  lista.style.border="1px solid #444";
  lista.style.borderRadius="6px";
  lista.style.zIndex="9999";
  lista.style.display="none";

  document.body.appendChild(lista);

  input.addEventListener("input",()=>{
    const valor=input.value.trim();

    if(valor.length < 3) return;

    const rect=input.getBoundingClientRect();

    lista.style.left = rect.left + "px";
    lista.style.top = rect.bottom + window.scrollY + "px";
    lista.style.width = rect.width + "px";

    autocompleteService.getPlacePredictions(
      {
        input:valor,
        componentRestrictions:{country:"br"}
      },
      predictions=>{
        lista.innerHTML="";

        if(!predictions) return;

        predictions.forEach(p=>{
          const item=document.createElement("div");

          item.textContent=p.description;
          item.style.padding="10px";
          item.style.cursor="pointer";

          item.onclick=()=>{
            input.value=p.description;
            lista.style.display="none";
          };

          lista.appendChild(item);
        });

        lista.style.display="block";
      }
    );
  });

  document.addEventListener("click",(e)=>{
    if(e.target !== input){
      lista.style.display="none";
    }
  });
}
function atualizarDestinoVisual(){

  const badges =
    document.querySelectorAll(".destino-badge");

  badges.forEach(badge=>{
    badge.style.display="none";
  });

  const itens =
    document.querySelectorAll(".parada-item");

  if(itens.length){

    const ultimo = itens[itens.length-1];

    const badge =
      ultimo.querySelector(".destino-badge");

    if(badge){
      badge.style.display="block";
    }

  }
}
/* CALCULAR */
function adicionarParada(){

  contadorParadas++;

  const wrapper=document.createElement("div");

  wrapper.className="parada-item";

  wrapper.innerHTML=`

    <div class="drag-handle" title="Arrastar">
      ☰
    </div>

    <input
      id="parada${contadorParadas}"
      class="parada"
      placeholder="Local ${contadorParadas}">

    <button
      type="button"
      class="remover-parada"
      title="Remover parada">
      🗑
    </button>

  `;

  wrapper
    .querySelector(".remover-parada")
    .addEventListener("click",()=>{

      wrapper.remove();

      if(typeof atualizarDestinoVisual==="function"){
        atualizarDestinoVisual();
      }

    });

  document
    .getElementById("paradasContainer")
    .appendChild(wrapper);

  configurarAutocomplete(
    `parada${contadorParadas}`
  );

  if(typeof atualizarDestinoVisual==="function"){
    atualizarDestinoVisual();
  }
}
function calcular(){

  const origem=document.getElementById("origem").value;

  const kmLitro=parseFloat(
    document.getElementById("kmLitro").value
  );

  const preco=parseFloat(
    document.getElementById("precoGasolina").value
  );

  const pedagioManual=parseFloat(
    document.getElementById("pedagioManual").value
  );

  const passageiros=parseInt(
    document.getElementById("passageiros")?.value || 1
  );

  const locais=[];

document
  .querySelectorAll(".parada")
  .forEach(input=>{

    if(input.value.trim()){
      locais.push(input.value.trim());
    }

  });

if(!origem || locais.length===0){

  alert(
    "Informe origem e pelo menos um local."
  );

  return;
}
    

  if(
    isNaN(kmLitro) ||
    kmLitro<=0 ||
    isNaN(preco) ||
    preco<=0
  ){
    alert("Preencha corretamente os dados.");
    return;
  }

  const destino =
  locais[locais.length-1];

const waypoints =
  locais
    .slice(0,-1)
    .map(local=>({
      location:local,
      stopover:true
    }));

  directionsService.route(
    {
      origin:origem,
      destination:destino,
      waypoints:waypoints,
      optimizeWaypoints:false,
      travelMode:"DRIVING"
    },

    (res,status)=>{

      if(status!=="OK"){
        alert("Erro ao calcular rota.");
        return;
      }

      directionsRenderer.setDirections(res);

      let distanciaKm=0;
      let tempoSegundos=0;

      res.routes[0].legs.forEach(leg=>{

        distanciaKm+=leg.distance.value;
        tempoSegundos+=leg.duration.value;

      });

      distanciaKm=distanciaKm/1000;

      const horas=Math.floor(
        tempoSegundos/3600
      );

      const minutos=Math.floor(
        (tempoSegundos%3600)/60
      );

      const duracao=
        horas+"h "+minutos+"min";

      const combustivel=
        (distanciaKm/kmLitro)*preco;

      const pedagioEstimado=
        distanciaKm*VALOR_PEDAGIO_POR_KM;

      const pedagioFinal=
        !isNaN(pedagioManual) &&
        pedagioManual>0
        ? pedagioManual
        : pedagioEstimado;

      const total=
        combustivel+pedagioFinal;

      const custoPorPessoa=
        total/passageiros;

      ultimaRota=`
🚗 Calcular Rota

📏 Distância: ${distanciaKm.toFixed(2)} km
⏱️ Tempo: ${duracao}
⛽ Combustível: R$ ${combustivel.toFixed(2)}
🛣️ Pedágio: R$ ${pedagioFinal.toFixed(2)}
💰 Total: R$ ${total.toFixed(2)}
👥 Por pessoa: R$ ${custoPorPessoa.toFixed(2)}
      `;

      document.getElementById(
        "resultado"
      ).style.display="block";

      document.getElementById(
        "resultado"
      ).innerHTML=`

📏 Distância: ${distanciaKm.toFixed(2)} km<br>
⏱️ Tempo: ${duracao}<br>
⛽ Combustível: R$ ${combustivel.toFixed(2)}<br>
🛣️ Pedágio estimado: R$ ${pedagioFinal.toFixed(2)}<br>
💰 Total: R$ ${total.toFixed(2)}<br>
👥 Custo por pessoa: R$ ${custoPorPessoa.toFixed(2)}<br><br>

<div class="botoes-app">

<button onclick="abrirGoogleMaps('${origem}','${destino}')">
📍 Abrir no Google Maps
</button>

<button onclick="abrirWaze('${destino}')">
🚗 Abrir no Waze
</button>

<button onclick="compartilharResultado()">
📤 Compartilhar
</button>

</div>

      `;
    }
  );
}

/* LINKS */
function abrirGoogleMaps(origem,destino){
  const url=`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origem)}&destination=${encodeURIComponent(destino)}&travelmode=driving`;
  window.open(url,"_blank");
}

function abrirWaze(destino){
  const url=`https://www.waze.com/ul?q=${encodeURIComponent(destino)}&navigate=yes`;
  window.open(url,"_blank");
}

/* COMPARTILHAR */
function compartilharResultado(){

  if(!ultimaRota){
    alert("Calcule uma rota primeiro.");
    return;
  }

  if(navigator.share){

    navigator.share({
      title:"Calcular Rota",
      text:ultimaRota
    });

  }else{

    navigator.clipboard.writeText(
      ultimaRota
    );

    alert(
      "Resultado copiado para a área de transferência."
    );

  }
}

/* FAVORITOS */
function salvarRota(){

  const nome=
    document.getElementById("nomeRota").value ||
    "Rota sem nome";

  const origem=
    document.getElementById("origem").value;

  if(!origem || !destino){
    alert("Informe origem e destino.");
    return;
  }

  const paradas=[];

  document
    .querySelectorAll(".parada")
    .forEach(input=>{

      if(input.value.trim()){
        paradas.push(
          input.value.trim()
        );
      }

    });

  const rota={
    nome,
    origem,
    destino,
    paradas
  };

  const rotas=
    JSON.parse(
      localStorage.getItem("rotas")
    ) || [];

  rotas.push(rota);

  localStorage.setItem(
    "rotas",
    JSON.stringify(rotas)
  );

  carregarListaRotas();

  alert("Rota salva.");
}

function carregarListaRotas(){

  const select=
    document.getElementById(
      "rotasSalvas"
    );

  select.innerHTML=
    '<option value="">Rotas salvas</option>';

  const rotas=
    JSON.parse(
      localStorage.getItem("rotas")
    ) || [];

  rotas.forEach((rota,index)=>{

    const option=
      document.createElement(
        "option"
      );

    option.value=index;
    option.textContent=rota.nome;

    select.appendChild(option);

  });

}

function carregarRota(){

  const index=
    document.getElementById(
      "rotasSalvas"
    ).value;

  if(index==="") return;

  const rotas=
    JSON.parse(
      localStorage.getItem("rotas")
    ) || [];

  const rota=
    rotas[index];

  document.getElementById(
    "nomeRota"
  ).value=rota.nome;

  document.getElementById(
    "origem"
  ).value=rota.origem;

 const destino = locais[locais.length - 1];

  document.getElementById(
    "paradasContainer"
  ).innerHTML="";

  contadorParadas=0;

  if(rota.paradas){

    rota.paradas.forEach(parada=>{

      adicionarParada();

      document.getElementById(
        `parada${contadorParadas}`
      ).value=parada;

    });

  }
}

carregarListaRotas();

/* INTERNET */
function verificarInternet(){
  const aviso=document.getElementById("offline-msg");

  if(navigator.onLine){
    aviso.style.display="none";
  }else{
    aviso.style.display="block";
  }
}

window.addEventListener("online",verificarInternet);
window.addEventListener("offline",verificarInternet);

verificarInternet();

/* BOTÃO INSTALAR APP */
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("btnInstalar").style.display="block";
});

document.getElementById("btnInstalar").addEventListener("click",async()=>{
  if(!deferredPrompt) return;

  deferredPrompt.prompt();

  await deferredPrompt.userChoice;

  deferredPrompt=null;

  document.getElementById("btnInstalar").style.display="none";
});

// version: 3.2.0
</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>
<!-- SortableJS -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDiYWC1UozNM6xqegQg__CQvNA3FXgFbEA&libraries=places&callback=initMap">
</script>
